			<!-- Main -->
				<div id="main" class="wrapper style1">
					<div class="container">
						<section id="content">
							<header class="major">
								<h2>Client Portal</h2>
							</header>

							<div class="portal-login-box">
								<h3>Sign In</h3>
								<form id="login-form">
									<div class="portal-field">
										<label for="login-email">Email</label>
										<input type="email" id="login-email" required autocomplete="email" />
									</div>
									<div class="portal-field">
										<label for="login-password">Password</label>
										<input type="password" id="login-password" required autocomplete="current-password" />
									</div>
									<button type="submit" class="portal-btn portal-btn-primary" id="login-btn">
										Sign In
									</button>
								</form>
								<p class="portal-error" id="login-error"></p>
							</div>
						</section>
					</div>
				</div>
			</article>

		<!-- Scripts -->
			<script src="../assets/js/jquery.min.js"></script>
			<script src="../assets/js/jquery.scrolly.min.js"></script>
			<script src="../assets/js/jquery.dropotron.min.js"></script>
			<script src="../assets/js/jquery.scrollex.min.js"></script>
			<script src="../assets/js/browser.min.js"></script>
			<script src="../assets/js/breakpoints.min.js"></script>
			<script src="../assets/js/util.js"></script>
			<script src="../assets/js/main.js"></script>

			<!-- Firebase -->
			<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
			<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
			<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
			<script src="../assets/js/firebase-config.js"></script>
			<script src="../assets/js/portal-auth.js"></script>

			<script>
				(function () {
					'use strict';

					portalAuth.redirectIfLoggedIn();

					var form = document.getElementById('login-form');
					var errorEl = document.getElementById('login-error');
					var btn = document.getElementById('login-btn');

					form.addEventListener('submit', function (e) {
						e.preventDefault();
						errorEl.textContent = '';
						btn.disabled = true;
						btn.textContent = 'Signing in\u2026';

						var email = document.getElementById('login-email').value.trim();
						var password = document.getElementById('login-password').value;

						portalAuth.loginWithEmail(email, password)
							.then(function (cred) {
								return portalAuth.getUserDoc(cred.user.uid);
							})
							.then(function (userDoc) {
								if (!userDoc) {
									errorEl.textContent = 'Account not configured. Contact admin.';
									btn.disabled = false;
									btn.textContent = 'Sign In';
									return;
								}
								if (userDoc.role === 'admin') {
									window.location.href = 'admin.html';
								} else {
									window.location.href = 'dashboard.html';
								}
							})
							.catch(function (err) {
								errorEl.textContent = 'Invalid email or password.';
								btn.disabled = false;
								btn.textContent = 'Sign In';
							});
					});
				})();
			</script>
	</body>
